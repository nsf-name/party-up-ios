name: Continuous Integration

on: [push, pull_request]

jobs:
  build-check:
    # keep this up to date!
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: install xcodegen
        run: brew install xcodegen

      - name: generate project
        run: xcodegen generate

      - name: build check 
        run: make release
